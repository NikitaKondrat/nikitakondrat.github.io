workflows:
  build-site:
    tasks:
      - name: build-and-publish-site
        cubes:
          - name: build-mkdocs-site
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              # Собираем: конфиг в src/, вывод в корневой docs/
              - mkdocs build -f src/mkdocs.yml -d ../docs
              - echo "Сайт собран в ./docs"
              - ls -la ../docs

          - name: publish-to-release-branch
            script:
              - git config --global user.name "sourcecraft-ci"
              - git config --global user.email "ci@sourcecraft.local"
              - git checkout -b release 2>/dev/null || git checkout release
              - git add docs/
              - git commit -m "feat: автоматическое обновление сайта" || echo "Нет изменений"
              - git push origin release -f