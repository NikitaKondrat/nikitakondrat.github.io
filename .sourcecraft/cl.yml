on:
  push:
    branches:
      - main

workflows:
  build-and-deploy:
    tasks:
      - name: build-mkdocs-site
        cubes:
          - name: build-with-mkdocs
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - cd ./src && mkdocs build -d ../docs
              - echo "Сайт успешно собран в папке docs/"
              - ls -la ../docs

      - name: publish-to-release-branch
        needs: [build-mkdocs-site]
        cubes:
          - name: git-push
            image: alpine/git
            script:
              - git config --global user.name "SourceCraft Bot"
              - git config --global user.email "bot@sourcecraft.local"

              - git checkout -b release

              - git add ../docs

              - git commit -m "chore: авто-обновление сайта из ветки main" || echo "Нет изменений для коммита"

              - git push origin release -f