on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-and-publish-site
        cubes:
          - name: build-mkdocs-site
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              # Абсолютный путь для надёжности
              - mkdocs build -f src/mkdocs.yml -d /sourcecraft/workspace/docs
              - echo "✅ Сайт собран в /sourcecraft/workspace/docs"
              - ls -la /sourcecraft/workspace/docs

          - name: publish-to-release-branch
            script:
              - git config --global user.name "sourcecraft-ci"
              - git config --global user.email "ci@sourcecraft.local"
              # Создаём или переключаемся на ветку release
              - git checkout -b release 2>/dev/null || git checkout release
              # Добавляем файлы из абсолютного пути, но относительно корня репозитория
              - git add docs/
              - git commit -m "feat: автоматическое обновление сайта" || echo "📦 Нет изменений для коммита"
              - git push origin release -f