on:
  push:
    branches: [main]

workflows:
  build-site:
    tasks:
      - name: deploy
        script:
          - echo "CI запущен!"
          - git checkout -b release 2>/dev/null || git checkout release
          - git rm -rf . 2>/dev/null || true
          - cp -r docs/* ./ 2>/dev/null || true
          - git add .
          - git commit -m "feat: обновлен сайт" || true
          - git push soursecraft release -f