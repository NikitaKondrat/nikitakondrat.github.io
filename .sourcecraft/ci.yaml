on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: publish-to-release-branch
        script:
          - git config --global user.email "ci@sourcecraft.dev"
          - git config --global user.name "SourceCraft CI"
          - git checkout -b release 2>/dev/null || git checkout release
          - git rm -rf . 2>/dev/null || true
          - cp -r ../docs/* ./ 2>/dev/null || cp -r docs/* ./
          - git add .
          - git commit -m "feat: обновлен сайт" || true
          - git push sourcecraft release -f